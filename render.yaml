services:
  - type: web
    name: hand-gesture-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: FRONTEND_URL
        value: https://hand-gesture-0eb5.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
